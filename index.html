<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SARAオプチャ専用　　チーム分け！</title>
  
  <!-- iOSアプリ化用設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SARAチーム分け">
  <link rel="apple-touch-icon" href="icon.png">

  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* デザイン部分は元のまま維持 */
    body { font-family: 'Zen Maru Gothic', 'Kaisei Decol', sans-serif; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; }
    .container { background: rgba(255, 255, 255, 0.93); border-radius: 24px; box-shadow: 0 6px 36px rgba(160, 120, 180, 0.18); max-width: 430px; width: 96vw; margin: 48px 0 24px 0; padding: 2.5em 2em 1.5em 2em; animation: fadeIn 1s; box-sizing: border-box; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(24px);} to { opacity: 1; transform: translateY(0);} }
    .clock-wrap { display: flex; justify-content: flex-end; margin-bottom: 0.3em; }
    .digital-clock { font-family: 'Kaisei Decol', monospace; font-size: 1.1em; color: #fff; background: linear-gradient(90deg, #d1b2ff 60%, #f9eaff 100%); border-radius: 14px; padding: 0.22em 1em; border: 2px solid #e3c6ff; display: inline-block; font-weight: 700; text-shadow: 0 1px 2px #cbb6e9; }
    h1 { font-family: 'Kaisei Decol', cursive; font-size: 2em; color: #a25cff; margin-bottom: 0.5em; text-align: center; }
    h2 { font-size: 1.1em; color: #5b41a9; margin: 1.8em 0 0.7em; }
    ul.participants { list-style: none; padding: 0; margin: 0 0 1em 0; display: grid; grid-template-columns: 1fr 1fr; gap: 0.7em; }
    label { display: flex; align-items: center; font-size: 1.07em; padding: 0.5em; background: #fdfbff; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    label:hover { background: #f3e6fd; }
    label input[type="checkbox"] { accent-color: #a25cff; margin-right: 0.6em; transform: scale(1.2); }
    .team-count-wrap { margin: 1em 0 1.5em 0; font-size: 1.1em; color: #6a50b2; }
    input[type="number"] { width: 50px; padding: 5px; border-radius: 8px; border: 1.2px solid #e5d2fa; }
    .btns { display: flex; gap: 1em; margin-bottom: 1em; }
    button { flex: 1; font-family: inherit; font-size: 1.07em; padding: 0.6em; border: none; border-radius: 1.4em; background: linear-gradient(90deg, #b385f7 0%, #a8e5ff 100%); color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    hr { border: none; border-top: 1.5px dashed #d9bcf7; margin: 1.5em 0; }
    .result { display: flex; flex-wrap: wrap; gap: 1em; justify-content: center; }
    .team-card { background: linear-gradient(120deg, #f5eeff 70%, #e3f6ff 100%); border-radius: 18px; padding: 1em; min-width: 140px; text-align: center; animation: fadeInTeam 0.5s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    @keyframes fadeInTeam { from { opacity: 0; transform: scale(0.95);} to { opacity: 1; transform: scale(1);} }
    .team-card strong { color: #a25cff; font-size: 1.14em; display: block; margin-bottom: 5px; }
    .team-card ul { list-style: none; padding: 0; margin: 0; }
    .team-card li { color: #473a6b; font-size: 1.05em; margin-bottom: 2px; }
    .title-bg-img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="clock-wrap">
      <span class="digital-clock" id="digital-clock"></span>
    </div>
    <img src="image.png" alt="ペチャウサイラスト" class="title-bg-img">
    <h1>SARAオプチャ専用<br>チーム分け！</h1>

    <h2>メンバーリスト</h2>
   <ul class="participants" id="participants-list">
  <!-- ここはJavaScriptで自動作成されるので空でOK -->
</ul>

    <div class="team-count-wrap">
      チーム数: <input type="number" id="team-count" min="2" value="2">
    </div>
    <div class="btns">
      <button onclick="splitTeams()">チーム分け！</button>
      <button onclick="resetAll()">リセット</button>
    </div>
    <hr>
    <div id="result" class="result"></div>
  </div>

  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
   // --- 時計機能 ---
  function updateClock() {
    const clock = document.getElementById('digital-clock');
    const now = new Date();
    clock.textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
  }
  setInterval(updateClock, 1000); updateClock();

  // --- Supabase設定 ---
  const _supabase = window.supabase.createClient(
    "https://ivgmpohqzicufksamoud.supabase.co/rest/v1/",
    "sb_publishable_YPe4ILiXSk080rYG4-DYxA_J7QYycfy"
  );

  // --- 1. 初期化処理（ページを開いた時に動く） ---
  async function init() {
    // A. membersテーブルからメンバー一覧を取得して表示
    await fetchMembers();

    // B. playerテーブルから現在のチェック状態を読み込み
    const { data } = await _supabase.from('player').select('*').eq('id', 1).single();
    if (data) applyData(data.selected_names, data.team_count);

    // C. リアルタイム監視（他人が更新した時に自分の画面も変わる設定）
    _supabase.channel('player_changes')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'player', filter: 'id=eq.1' }, payload => {
        applyData(payload.new.selected_names, payload.new.team_count);
      }).subscribe();
  }

  // --- 2. データベースからメンバー名を取ってきてHTMLを作る ---
  async function fetchMembers() {
    const { data, error } = await _supabase
      .from('members')
      .select('*')
      .order('id', { ascending: true });

    if (error) {
      console.error("データ取得エラー:", error);
      return;
    }

    const list = document.getElementById('participants-list');
    // 重要：ここでチェックボックスを自動生成しています
    list.innerHTML = data.map(m => `
      <li>
        <label>
          <input type="checkbox" value="${m.name}" onchange="syncCloud()">
          ${m.name}
        </label>
      </li>
    `).join('');
  }

  // --- 3. 画面の表示を更新する ---
  function applyData(names, count) {
    document.querySelectorAll('#participants-list input').forEach(cb => {
      cb.checked = names.includes(cb.value);
    });
    document.getElementById('team-count').value = count;
  }

  // --- 4. チェック状態をSupabase（playerテーブル）に保存する ---
  async function syncCloud() {
    const selected = [];
    document.querySelectorAll('#participants-list input:checked').forEach(cb => selected.push(cb.value));
    const count = document.getElementById('team-count').value;
    await _supabase.from('player').update({ selected_names: selected, team_count: count }).eq('id', 1);
  }

  // チーム分け実行
  function splitTeams() {
    const selected = [];
    document.querySelectorAll('#participants-list input:checked').forEach(cb => selected.push(cb.value));
    const teamCount = parseInt(document.getElementById('team-count').value);

    if (selected.length < teamCount) return alert("人数が足りません！");

    const shuffled = selected.sort(() => Math.random() - 0.5);
    const teams = Array.from({ length: teamCount }, () => []);
    shuffled.forEach((name, i) => teams[i % teamCount].push(name));

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = teams.map((team, i) => `
      <div class="team-card"><strong>チーム${i+1}</strong><ul>${team.map(n => `<li>${n}</li>`).join('')}</ul></div>
    `).join('');
  }

  // リセット
  function resetAll() {
    document.querySelectorAll('#participants-list input').forEach(cb => cb.checked = false);
    document.getElementById('result').innerHTML = '';
    syncCloud();
  }

  // 最後に実行
  init();
  </script>
</body>
</html>
